aid: shovels
name: Shovels
description: >-
  Shovels is the intelligence layer for the built world, providing building
  permit data and contractor intelligence aggregated from 1,800+ jurisdictions
  across the United States. The platform offers 130M+ building permits,
  2.3M+ contractor profiles, property details, resident information, and
  geographic market metrics. Shovels helps materials suppliers, construction
  tech companies, energy and climate firms, home services companies, real
  estate professionals, and telecommunications providers identify qualified
  contractors, understand work history, and power sales and marketing with
  rich permit data.
type: Index
