apis:
  - aid: shovels:shovels-api
    name: Shovels API
    description: >-
      The Shovels API v2 provides programmatic access to building permit
      intelligence and contractor data from 1,800+ US jurisdictions. Access
      130M+ permits, 2.3M+ contractor profiles, geographic metrics, resident
      data, and market analytics. Authentication uses an X-API-Key header.
      Supports cursor-based pagination, credit tracking, and advanced filtering
      by geography, date range, tags, job value, property type, and contractor
      attributes. Data refreshes on the 1st and 15th of each month.
    humanURL: https://www.shovels.ai/api
